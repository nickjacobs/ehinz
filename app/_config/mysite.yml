---
Name: myproject
---
SilverStripe\Core\Manifest\ModuleManifest:
  project: app


Silverstripe\SiteConfig\SiteConfig:
  extensions:
    - CustomSiteConfig

SilverStripe\CMS\Model\SiteTree:
  extensions:
    - SiteTreeAnchorExtension

SilverStripe\Assets\File:
  allowed_extensions:
    - svg

SilverStripe\Forms\HTMLEditor\TinyMCEConfig:
  editor_css:
    - 'css/editor.css'

SilverStripe\Admin\LeftAndMain:
  extra_requirements_css:
    - 'css/cms.css'

StevieMayhew\SilverStripeSVG\SVGTemplate:
  base_path: 'public/images/'
  default_extra_classes:
    - 'svg-image'

SilverStripe\ORM\Search\FulltextSearchable:
  enabled: ‘true’

SilverStripe\Blog\Model\Blog:
  extensions:
    - SilverStripe\Widgets\Extensions\WidgetPageExtension

SilverStripe\Blog\Model\BlogPost:
  extensions:
    - SilverStripe\Widgets\Extensions\WidgetPageExtension
    - BlogPostExtension

SilverStripe\Blog\Widgets\BlogRecentPostsWidgetController:
  extensions:
    - BlogRecentPostsWidgetControllerExtension


